name: Daily v2.2 Scores

# 언제 실행되나 (하루 2번: 한국장·미국장 개장 3시간+ 전)
on:
  schedule:
    # ⚠️ cron은 UTC 기준이며 서머타임 미적용.
    #    GitHub 예약 실행은 매시 '정각(:00)'·'반(:30)'에 부하가 몰려 지연·누락되기 쉬움.
    #    그래서 일부러 한산한 분(:47, :13)으로 설정해 신뢰도를 높임.
    #    (분 시 일 월 요일) 순서.
    #
    # ① 한국장 개장 3시간+ 전: 05:47 KST  (한국장 09:00 개장)
    #    KST = UTC+9 → 05:47 KST = 전날 20:47 UTC.  요일 0-4(일~목 UTC) = 월~금 KST
    - cron: "47 20 * * 0-4"
    #
    # ② 미국장 개장 3시간+ 전: 약 06:13 ET (미국장 09:30 ET 개장)
    #    10:13 UTC = 여름 06:13 ET / 겨울 05:13 ET → 1년 내내 개장 3시간 이상 전.
    - cron: "13 10 * * 1-5"
  workflow_dispatch:   # ← Actions 탭에서 "Run workflow" 버튼으로 수동 실행(테스트용)

# scores.json을 다시 커밋해야 하므로 쓰기 권한 부여
permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 점수 엔진 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}   # ← Settings의 Secret에서 주입(없으면 CSV로 동작)
        run: python engine.py

      - name: scores.json 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json candles.json
          # 바뀐 게 없으면(주말·휴장 등) 그냥 통과
          if git diff --staged --quiet; then
            echo "변경 없음 — 통과"
          else
            git commit -m "Update scores $(date -u +%Y-%m-%d)"
            # 실행 중 원격(main)이 먼저 바뀌었을 수 있으니, rebase로 합친 뒤 푸시(충돌 시 재시도).
            ok=0
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then ok=1; break; fi
              echo "원격이 앞서 있어 재시도 ${i}…"; sleep 5
            done
            if [ "$ok" != "1" ]; then echo "푸시 3회 실패"; exit 1; fi
          fi
