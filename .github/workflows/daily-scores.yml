name: Daily v2.2 Scores

# 언제 실행되나 (하루 2번: 한국장·미국장 개장 2시간 전)
on:
  schedule:
    # ⚠️ cron은 항상 UTC 기준이며 서머타임을 자동으로 따르지 않음.
    #    (분 시 일 월 요일) 순서. 시간 바꾸려면 아래 숫자만 수정.
    #
    # ① 한국장 개장 2시간 전: 07:00 KST  (한국장 09:00 개장)
    #    KST = UTC+9 → 07:00 KST = 전날 22:00 UTC
    #    한국 거래일(월~금) 아침이 되려면 UTC 기준 일~목에 실행해야 함 → 요일 0-4
    - cron: "0 22 * * 0-4"
    #
    # ② 미국장 개장 2시간 전: 약 07:30 ET (미국장 09:30 ET 개장)
    #    ET = UTC-4(서머타임, 3~11월) / UTC-5(겨울).
    #    11:30 UTC = 여름 07:30 ET(정확히 2시간 전) / 겨울 06:30 ET(3시간 전).
    #    → cron은 서머타임을 모르므로, 1년 내내 "개장 2시간 이상 전"이 되도록 11:30 UTC로 고정.
    - cron: "30 11 * * 1-5"
  workflow_dispatch:   # ← Actions 탭에서 "Run workflow" 버튼으로 수동 실행(테스트용)

# scores.json을 다시 커밋해야 하므로 쓰기 권한 부여
permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 점수 엔진 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}   # ← Settings의 Secret에서 주입(없으면 CSV로 동작)
        run: python engine.py

      - name: scores.json 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          # 바뀐 게 없으면(주말·휴장 등) 그냥 통과, 있으면 커밋·푸시
          git diff --staged --quiet || (git commit -m "Update scores $(date -u +%Y-%m-%d)" && git push)
