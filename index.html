<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>매수타이밍 v2.2</title>
<meta name="theme-color" content="#0a0b0d" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{ margin:0; padding:0; background:#0a0b0d; -webkit-tap-highlight-color:transparent; }
  *{ box-sizing:border-box; }
  .app-page{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(1100px 600px at 18% -10%,#1a1c22 0%,transparent 55%),radial-gradient(900px 500px at 100% 0%,#16140f 0%,transparent 50%),#0a0b0d; padding:24px 14px; font-family:'Manrope','Noto Sans KR',sans-serif; }
  .phone{ width:100%; max-width:412px; height:min(864px,95vh); background:#0d0e11; border:1px solid #23262d; border-radius:36px; box-shadow:0 40px 90px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.04); overflow:hidden; position:relative; display:flex; flex-direction:column; }
  /* 실제 폰에서는 풀스크린(프레임 제거) */
  @media (max-width:480px){
    .app-page{ padding:0; }
    .phone{ max-width:100%; width:100%; height:100vh; height:100dvh; border-radius:0; border:0; box-shadow:none; }
  }
  .hd{ padding:calc(15px + env(safe-area-inset-top)) 20px 11px; flex-shrink:0; }
  .hd-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .kicker{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:12px; letter-spacing:.04em; color:#d9a441; }
  .title{ font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:23px; color:#ece7df; margin-top:2px; }
  .date{ font-family:'JetBrains Mono',monospace; font-size:11px; color:#8b9099; margin-top:6px; }
  .icobtn{ background:#16181c; border:1px solid #25282f; color:#9aa0a8; border-radius:10px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .icorow{ display:flex; gap:7px; }
  .seg{ display:flex; gap:6px; margin:0 20px 11px; background:#121317; border:1px solid #23262d; border-radius:14px; padding:4px; flex-shrink:0; }
  .seg button{ flex:1; border:0; cursor:pointer; padding:8px 0; border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:13.5px; font-weight:600; background:transparent; color:#8b9099; transition:.18s; }
  .seg button.on{ background:#262931; color:#ece7df; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  .scroll{ flex:1; overflow-y:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ width:0; }
  .center{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:30px; text-align:center; }
  .spinner{ width:34px; height:34px; border:3px solid #23262d; border-top-color:#d9a441; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .muted{ font-family:'Noto Sans KR',sans-serif; font-size:13px; color:#8b9099; line-height:1.6; }
  .retry{ margin-top:6px; background:#1d2026; border:1px solid #2e323b; color:#ece7df; border-radius:10px; padding:8px 16px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .brief{ margin:0 18px 14px; padding:15px 16px; background:linear-gradient(180deg,#15171b,#111317); border:1px solid #25282f; border-radius:18px; }
  .brief-h{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .brief-h h3{ font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:14px; color:#ece7df; margin:0; }
  .vtag{ font-family:'JetBrains Mono',monospace; font-size:10px; color:#0a0b0d; background:#d9a441; padding:2px 6px; border-radius:5px; font-weight:700; }
  .brief-b{ font-family:'Noto Sans KR',sans-serif; font-size:12.5px; line-height:1.62; color:#a8adb6; }
  .brief-b b{ color:#d7d2ca; font-weight:700; }
  .buychips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .buychip{ font-family:'Noto Sans KR',sans-serif; font-size:11.5px; font-weight:600; color:#4cc77f; background:rgba(76,199,127,.1); border:1px solid rgba(76,199,127,.25); padding:3px 9px; border-radius:999px; }
  .seclabel{ font-family:'JetBrains Mono',monospace; font-size:10px; color:#5d626b; letter-spacing:.06em; text-transform:uppercase; padding:2px 22px 8px; }
  .brow{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:13px; }
  .brank{ font-family:'JetBrains Mono',monospace; font-size:12px; color:#6b7079; width:22px; text-align:center; flex-shrink:0; }
  .bname{ flex:1; min-width:0; font-family:'Noto Sans KR',sans-serif; font-weight:600; font-size:14.5px; color:#e7e2da; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bpr{ text-align:right; flex-shrink:0; }
  .bp{ font-family:'JetBrains Mono',monospace; font-size:13.5px; color:#d7d2ca; }
  .bchg{ font-family:'JetBrains Mono',monospace; font-size:11px; display:block; margin-top:2px; }
  .gdot{ width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .info{ margin:0 20px 12px; background:#121317; border:1px solid #25282f; border-radius:14px; padding:13px 14px; font-family:'Noto Sans KR',sans-serif; font-size:12px; line-height:1.65; color:#a8adb6; }
  .info b{ color:#d7d2ca; font-weight:700; }
  .info .leg{ display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; font-size:11px; }
  .leg span{ display:inline-flex; align-items:center; gap:4px; }
  .ldot{ width:8px; height:8px; border-radius:3px; display:inline-block; }
  .summary{ display:flex; gap:7px; margin:0 20px 11px; }
  .stat{ flex:1; background:#121317; border:1px solid #23262d; border-radius:13px; padding:9px 6px; text-align:center; }
  .stat .n{ font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:700; }
  .stat .l{ font-family:'Noto Sans KR',sans-serif; font-size:10px; color:#8b9099; margin-top:1px; }
  .ctx{ margin:0 20px 11px; font-family:'Noto Sans KR',sans-serif; font-size:11.5px; color:#8b9099; background:#15140f; border:1px solid #2e2a1c; border-radius:11px; padding:8px 12px; line-height:1.5; }
  .ctx b{ color:#d9a441; }
  .chips{ display:flex; gap:7px; margin:0 20px 8px; }
  .chip{ border:1px solid #25282f; background:#121317; color:#8b9099; cursor:pointer; border-radius:999px; padding:5px 13px; font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:600; }
  .chip.on{ background:#262931; color:#ece7df; border-color:#33363e; }
  .srow{ display:flex; align-items:center; gap:12px; padding:11px 11px 11px 12px; border-radius:14px; cursor:pointer; position:relative; }
  .bar{ position:absolute; left:0; top:11px; bottom:11px; width:3px; border-radius:3px; }
  .sc{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:23px; width:40px; text-align:center; flex-shrink:0; }
  .mid{ flex:1; min-width:0; }
  .nm{ display:flex; align-items:center; gap:6px; }
  .nm .name{ font-family:'Noto Sans KR',sans-serif; font-weight:600; font-size:14.5px; color:#e7e2da; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .typetag{ font-family:'JetBrains Mono',monospace; font-size:9.5px; font-weight:700; padding:1px 5px; border-radius:5px; flex-shrink:0; }
  .ta{ color:#7fb8e6; background:rgba(76,132,232,.14); } .tb{ color:#c79bd6; background:rgba(168,108,200,.14); }
  .drv{ font-family:'Noto Sans KR',sans-serif; font-size:11px; color:#787d86; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .right{ text-align:right; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .pill{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:600; padding:2px 7px; border-radius:999px; font-family:'Noto Sans KR',sans-serif; white-space:nowrap; }
  .chg{ font-family:'JetBrains Mono',monospace; font-size:11px; }
  .detail{ margin:0 12px 6px; padding:11px 14px; background:#101216; border:1px solid #23262d; border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:12px; color:#a8adb6; line-height:1.6; }
  .detail .grid{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:6px; }
  .detail .kv{ font-size:11.5px; } .detail .kv span{ color:#6b7079; }
  .detail .kv b{ color:#d7d2ca; font-family:'JetBrains Mono',monospace; font-weight:700; }
  .foot{ padding:9px 20px calc(12px + env(safe-area-inset-bottom)); font-family:'Noto Sans KR',sans-serif; font-size:10.5px; color:#5d626b; line-height:1.5; }
  .tabbar{ display:flex; border-top:1px solid #1d1f24; background:#0c0d10; flex-shrink:0; padding-bottom:env(safe-area-inset-bottom); }
  .tabbar button{ flex:1; border:0; background:transparent; cursor:pointer; padding:11px 0 14px; display:flex; flex-direction:column; align-items:center; gap:4px; color:#646a73; font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:600; }
  .tabbar button.on{ color:#ece7df; } .tabbar button.on .tdash{ background:#d9a441; }
  .tdash{ width:18px; height:2px; border-radius:2px; background:transparent; margin-top:1px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ⬇⬇⬇ 형석님 저장소의 scores.json 주소 (저장소 이름 바뀌면 여기만 수정)
const SCORES_URL = "https://raw.githubusercontent.com/qpt815-afk/stock-scores/main/scores.json";

// ── 인라인 아이콘 (외부 의존 없음) ──
const Svg = ({size=18, children, fill="none", color="currentColor"}) =>
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'block'}}>{children}</svg>;
const Info = (p)=><Svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Svg>;
const Star = ({size,fill,color})=><Svg size={size} fill={fill||"none"} color={color}><polygon points="12 2 15 9 22 9 16.5 13.5 18.5 21 12 16.5 5.5 21 7.5 13.5 2 9 9 9"/></Svg>;
const Newspaper = (p)=><Svg {...p}><path d="M4 4h13v16H6a2 2 0 0 1-2-2z"/><line x1="7" y1="8" x2="14" y2="8"/><line x1="7" y1="12" x2="14" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/><path d="M17 8h3v10a2 2 0 0 1-2 2"/></Svg>;
const BarChart3 = (p)=><Svg {...p}><line x1="6" y1="20" x2="6" y2="12"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="14"/></Svg>;
const RefreshCw = (p)=><Svg {...p}><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></Svg>;
const AlertCircle = (p)=><Svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Svg>;

const STATUS = {
  ok:      { label: "매수가능",   icon: "✅", color: "#4cc77f", bg: "rgba(76,199,127,.12)" },
  hot:     { label: "과열주의",   icon: "⚠️", color: "#e3ad44", bg: "rgba(227,173,68,.12)" },
  blocked: { label: "게이트차단", icon: "⛔", color: "#e7704e", bg: "rgba(231,112,78,.12)" },
  below:   { label: "60 미달",    icon: "·",  color: "#777c85", bg: "rgba(120,126,135,.08)" },
  pending: { label: "데이터대기", icon: "…",  color: "#5d626b", bg: "rgba(120,126,135,.06)" },
};
const isBuyable = (g) => g === "ok" || g === "hot";
const chgColor = (c) => (c >= 0 ? "#e5484d" : "#4c84e8");
const fmt = (n) => (typeof n === "number" ? n.toLocaleString() : n);
const Pill = ({ gate }) => { const s = STATUS[gate] || STATUS.pending;
  return <span className="pill" style={{ color: s.color, background: s.bg }}>{s.icon} {s.label}</span>; };

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [tab, setTab] = useState("brief");
  const [market, setMarket] = useState("kr");
  const [filter, setFilter] = useState("all");
  const [open, setOpen] = useState(null);
  const [info, setInfo] = useState(false);

  const load = () => {
    setLoading(true); setErr(null);
    fetch(`${SCORES_URL}?t=${Date.now()}`)
      .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then((d) => { setData(d); setLoading(false); })
      .catch((e) => { setErr(e.message || "불러오기 실패"); setLoading(false); });
  };
  useEffect(load, []);

  const raw = data ? (market === "kr" ? data.kr : data.us) || [] : [];
  const cur = market === "kr" ? "₩" : "$";
  const byRank = raw.slice().sort((a, b) => a.rank - b.rank);
  const counts = raw.reduce((a, x) => ((a[x.gate] = (a[x.gate] || 0) + 1), a), {});
  const buyN = (counts.ok || 0) + (counts.hot || 0);
  const buyList = raw.filter((x) => isBuyable(x.gate)).sort((a, b) => (b.total ?? 0) - (a.total ?? 0));
  let scored = raw.slice();
  if (filter === "buy") scored = scored.filter((x) => isBuyable(x.gate));
  if (filter === "hold") scored = scored.filter((x) => !isBuyable(x.gate));
  scored.sort((a, b) => (b.total ?? -1) - (a.total ?? -1));

  return (
    <div className="app-page">
      <div className="phone">
        <div className="hd">
          <div className="hd-top">
            <div>
              <div className="kicker">{tab === "brief" ? "Daily Market Brief · v2.2" : "Buy-Timing Score · v2.2"}</div>
              <div className="title">{tab === "brief" ? "오늘의 브리핑" : "매수타이밍 점수"}</div>
              <div className="date">{data?.as_of ? `${data.as_of} 기준` : "—"}</div>
            </div>
            <div className="icorow">
              <div className="icobtn" onClick={load} title="새로고침"><RefreshCw size={16} /></div>
              {tab === "score" && <div className="icobtn" onClick={() => setInfo(!info)}><Info size={17} /></div>}
            </div>
          </div>
        </div>

        <div className="seg">
          <button className={market === "kr" ? "on" : ""} onClick={() => { setMarket("kr"); setOpen(null); }}>🇰🇷 한국</button>
          <button className={market === "us" ? "on" : ""} onClick={() => { setMarket("us"); setOpen(null); }}>🇺🇸 미국</button>
        </div>

        {loading ? (
          <div className="center"><div className="spinner" /><div className="muted">scores.json 불러오는 중…</div></div>
        ) : err ? (
          <div className="center">
            <AlertCircle size={30} color="#e7704e" />
            <div className="muted">데이터를 불러오지 못했어요.<br/><b style={{color:'#a8adb6'}}>{err}</b><br/><br/>저장소가 Public인지, SCORES_URL이 맞는지 확인해 주세요.</div>
            <button className="retry" onClick={load}><RefreshCw size={14}/> 다시 시도</button>
          </div>
        ) : tab === "brief" ? (
          <div className="scroll" key={"b" + market}>
            <div className="brief">
              <div className="brief-h"><h3>오늘의 요약</h3><span className="vtag">v2.2</span></div>
              <div className="brief-b">
                {market === "kr"
                  ? <>환율 <b>{fmt(data.fx_usdkrw)}원</b> · 한국 상위 {byRank.length}종목 중 게이트 통과 <b>{buyN}종목</b>. 종합점수가 높아도 이격도 게이트에 막히면 보류예요.</>
                  : <>환율 <b>{fmt(data.fx_usdkrw)}원</b>이라 미국주 <b>{data.fx_penalty}점</b> 페널티 적용 중. 게이트 통과 <b>{buyN}종목</b>.</>}
              </div>
              {buyList.length > 0 && (
                <div className="buychips">{buyList.slice(0, 8).map((x) => <span className="buychip" key={x.rank}>{x.name} {x.total}</span>)}</div>
              )}
            </div>
            <div className="seclabel">시총 순위</div>
            <div style={{ padding: "0 12px 16px" }}>
              {byRank.map((x) => (
                <div className="brow" key={x.rank}>
                  <span className="brank">{String(x.rank).padStart(2, "0")}</span>
                  <span className="bname">{x.name}</span>
                  <div className="bpr">
                    <span className="bp">{cur}{fmt(x.close)}</span>
                    <span className="bchg" style={{ color: chgColor(x.chg_pct) }}>{x.chg_pct >= 0 ? "▲" : "▼"} {Math.abs(x.chg_pct).toFixed(2)}%</span>
                  </div>
                  <span className="gdot" style={{ background: (STATUS[x.gate] || STATUS.pending).color }} />
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div className="scroll" key={"s" + market + filter}>
            {info && (
              <div className="info">
                <div><b>유형 A</b>: 펀더35 · 추세건전성30(이격도12+정배열10+거래량8) · 모멘텀15 · 시장위험20</div>
                <div style={{ marginTop: 4 }}><b>유형 B</b>: 펀더30 · 52주위치20 · 낙폭15 · 모멘텀20 · 시장위험15</div>
                <div style={{ marginTop: 6 }}><b>게이트</b> = 종합 <b>60점+</b> 그리고 (유형A는) <b>이격도 7점+</b>. 미국은 환율 페널티 차감.</div>
                <div className="leg">{["ok","hot","blocked","below"].map(g => <span key={g}><i className="ldot" style={{ background: STATUS[g].color }} />{STATUS[g].label}</span>)}</div>
              </div>
            )}
            <div className="summary">
              {["ok", "hot", "blocked", "below"].map((g) => (
                <div className="stat" key={g}><div className="n" style={{ color: STATUS[g].color }}>{counts[g] || 0}</div><div className="l">{STATUS[g].label}</div></div>
              ))}
            </div>
            <div className="ctx">
              {market === "kr"
                ? <>오늘 매수가능 <b>{buyN}종목</b>. 게이트 통과한 종목만 분할 1차 진입 대상.</>
                : <>환율 <b>{data.fx_penalty}점</b> 페널티 적용 중 ({fmt(data.fx_usdkrw)}원). 매수가능 <b>{buyN}종목</b>.</>}
            </div>
            <div className="chips">
              {[["all", "전체"], ["buy", "✅ 매수가능"], ["hold", "보류"]].map(([k, l]) => (
                <button key={k} className={`chip ${filter === k ? "on" : ""}`} onClick={() => setFilter(k)}>{l}</button>
              ))}
            </div>
            <div style={{ padding: "2px 12px 8px" }}>
              {scored.map((x) => {
                const id = `${market}-${x.rank}`;
                const s = STATUS[x.gate] || STATUS.pending;
                const drv = x.type === "A"
                  ? `유형A · 이격도 ${x.disparity_score}점 (${x.disparity}%)${x.total == null ? " · 펀더 대기" : ""}`
                  : `유형B · 낙폭 ${x.drawdown ?? "-"}/15 · 52주 ${x.pos_52w ?? "-"}/20${x.total == null ? " · 펀더 대기" : ""}`;
                return (
                  <div key={id}>
                    <div className="srow" onClick={() => setOpen(open === id ? null : id)}>
                      <span className="bar" style={{ background: s.color }} />
                      <span className="sc" style={{ color: s.color }}>{x.total ?? "—"}</span>
                      <div className="mid">
                        <div className="nm">
                          {x.gate === "ok" && x.type === "A" && x.disparity_score === 12 && x.disparity < 0 && <Star size={13} fill="#d9a441" color="#d9a441" />}
                          <span className="name">{x.name}</span>
                          <span className={`typetag ${x.type === "A" ? "ta" : "tb"}`}>{x.type}</span>
                        </div>
                        <div className="drv">{drv}</div>
                      </div>
                      <div className="right">
                        <Pill gate={x.gate} />
                        <span className="chg" style={{ color: chgColor(x.chg_pct) }}>{x.chg_pct >= 0 ? "▲" : "▼"} {Math.abs(x.chg_pct).toFixed(2)}%</span>
                      </div>
                    </div>
                    {open === id && (
                      <div className="detail">
                        <div className="grid">
                          <div className="kv"><span>종합</span> <b>{x.total ?? "대기"}</b></div>
                          <div className="kv"><span>펀더</span> <b>{x.fundamental ?? "—"}</b></div>
                          {x.type === "A" ? (
                            <>
                              <div className="kv"><span>이격도</span> <b>{x.disparity}%({x.disparity_score})</b></div>
                              <div className="kv"><span>추세건전성</span> <b>{x.trend_health}/30</b></div>
                            </>
                          ) : (
                            <>
                              <div className="kv"><span>52주위치</span> <b>{x.pos_52w}/20</b></div>
                              <div className="kv"><span>낙폭</span> <b>{x.drawdown}/15</b></div>
                            </>
                          )}
                          <div className="kv"><span>모멘텀</span> <b>{x.momentum}</b></div>
                          <div className="kv"><span>시장위험</span> <b>{x.market_risk}</b></div>
                          {market === "us" && <div className="kv"><span>환율</span> <b>{x.fx_penalty}</b></div>}
                        </div>
                        <div>
                          {x.gate === "ok" && "✅ 게이트 통과 — 분할 1차 진입 가능."}
                          {x.gate === "hot" && "⚠️ 이격도 과열 영역 — 분할 1차만 보수적으로."}
                          {x.gate === "blocked" && "⛔ 점수는 높지만 이격도 미달 — 강제 DCA 30%만, 70%는 회귀까지 대기."}
                          {x.gate === "below" && "60점 미달 — 매수 보류."}
                          {x.gate === "pending" && "영업이익(펀더멘털) 데이터가 없어 종합점수 산정 대기."}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="foot">시세·이격도·게이트는 자동 산출. 한국 펀더멘털은 DART, 미국은 inputs.csv. 매수 전용 단계 분석.</div>
          </div>
        )}

        <div className="tabbar">
          <button className={tab === "brief" ? "on" : ""} onClick={() => setTab("brief")}><Newspaper size={20} /> 브리핑 <span className="tdash" /></button>
          <button className={tab === "score" ? "on" : ""} onClick={() => setTab("score")}><BarChart3 size={20} /> 점수 <span className="tdash" /></button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// 서비스워커 등록 (PWA 설치 가능 + 앱 셸 캐시)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
